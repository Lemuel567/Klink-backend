server:
  server-header: ""
  # Finish in-flight requests (e.g. a Paystack verify writing the ledger)
  # before the process exits on redeploy/restart.
  shutdown: graceful
  # Mobile networks: gzip JSON list responses (directory, feeds)
  compression:
    enabled: true
    mime-types: application/json
    min-response-size: 1024

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  task:
    scheduling:
      pool:
        # Default is ONE thread for all 10 @Scheduled jobs — Birthday and
        # EventReminder share the same 8:00 cron, and one hung FCM/SMS call
        # would stall every scheduler in the app.
        size: 5
  # No in-memory user: auth is JWT-only (JwtFilter). Without this exclusion Spring Boot
  # generates a default user and prints its password to the logs at startup.
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${DB_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      pool-name: KlinkHikariPool
      auto-commit: true
      connection-test-query: SELECT 1
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      keepalive-time: 60000
      max-lifetime: 1800000
      idle-timeout: 600000
      # Log a warning when a connection is held >60s — surfaces transactions
      # that pin the pool (e.g. network I/O inside @Transactional)
      leak-detection-threshold: 60000
  jpa:
    open-in-view: false
    hibernate:
      # Kept as a transition safety net while Flyway is adopted. Flyway is now the
      # source of truth for schema changes (add a new V__*.sql per change). Once the
      # V1 baseline has been diffed against a real `pg_dump --schema-only`, set
      # HIBERNATE_DDL_AUTO=validate (or none) to make Flyway fully authoritative.
      ddl-auto: ${HIBERNATE_DDL_AUTO:update}
    show-sql: false
  # Flyway runs before Hibernate. On the EXISTING (non-empty) database it records the
  # V1 baseline WITHOUT executing it (baseline-on-migrate) and then applies V2+; the
  # live schema is never rebuilt. On a fresh database V1 creates everything.
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: "existing Hibernate-managed schema"
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 32MB
  mvc:
    async:
      request-timeout: 30000
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Actuator: liveness/readiness split + a real DB-inclusive health probe.
# Only health and info are exposed; everything else stays shut.
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 900000
    refresh-expiration-ms: 2592000000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}

security:
  rate-limit:
    bypass-localhost: true
    login:
      max-attempts-per-account: 5
      # Whole congregations share one NAT'd Wi-Fi/hotspot IP — 20 locked everyone
      # out after a handful of members' failed attempts. Per-account stays at 5.
      max-attempts-per-ip: 50
      window-minutes: 15
      failure-reset-hours: 24
      lockout-attempts: 5
      lockout-minutes: 15
    register:
      max-attempts: 10
      window-hours: 1
    resend-verification:
      max-attempts: 10
      window-hours: 1
    forgot-password:
      max-attempts: 5
      window-hours: 1
    refresh:
      # Access tokens expire every 15 min, so every active session refreshes ~4x/hour.
      # 10/hour/IP throttled NORMAL use on shared IPs and produced the
      # "Too many requests. Try again in 60 minutes." error on sign-in flows.
      max-attempts: 120
      window-hours: 1
    verify-email:
      max-attempts: 10
      window-minutes: 15
    reset-password:
      max-attempts: 10
      window-minutes: 15
    phone-verify:
      max-attempts: 5
      window-minutes: 15
    phone-resend:
      max-attempts: 6
      window-hours: 1
    phone-update:
      max-attempts: 3
      window-hours: 24

paystack:
  secret-key: ${PAYSTACK_SECRET_KEY:}
  public-key: ${PAYSTACK_PUBLIC_KEY:}
  base-url: https://api.paystack.co
  callback-url: ${PAYSTACK_CALLBACK_URL:}
  # Paystack signs webhooks with your secret key (HMAC-SHA512). A separate
  # webhook secret is not issued; leave blank to verify with secret-key.
  webhook-secret: ${PAYSTACK_WEBHOOK_SECRET:}

# Google Gemini (free tier) — expands a manager's brief sermon notes into a
# detailed summary. Get a key at aistudio.google.com ("Get API key") and set
# GEMINI_API_KEY in .env; the feature 503s with a clear message until then.
gemini:
  api-key: ${GEMINI_API_KEY:}
  # "gemini-flash-latest" is a MOVING alias that drifted onto gemini-3.6-flash,
  # a preview model with a 20-requests/DAY free-tier cap — it exhausts almost
  # instantly and every call after returns 429. "gemini-flash-lite-latest"
  # (currently gemini-3.5-flash-lite) is a stable lite model with a far larger
  # free-tier daily allowance. Override with GEMINI_MODEL if you upgrade to paid.
  model: ${GEMINI_MODEL:gemini-flash-lite-latest}

supabase:
  url: ${SUPABASE_URL}
  service-key: ${SUPABASE_SERVICE_KEY}
  storage:
    bucket: klink-storage

firebase:
  credentials-json: ${FIREBASE_CREDENTIALS_JSON:}
  credentials-path: firebase-service-account.json

sms:
  api-url: ${SMS_API_URL:}
  api-key: ${SMS_API_KEY:}
  sender-id: ${SMS_SENDER_ID:Klink}

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  from-number: ${TWILIO_FROM_NUMBER:}

