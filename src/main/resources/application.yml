server:
  server-header: ""

spring:
  # No in-memory user: auth is JWT-only (JwtFilter). Without this exclusion Spring Boot
  # generates a default user and prints its password to the logs at startup.
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${DB_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      pool-name: KlinkHikariPool
      auto-commit: true
      connection-test-query: SELECT 1
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      keepalive-time: 60000
      max-lifetime: 1800000
      idle-timeout: 600000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 32MB
  mvc:
    async:
      request-timeout: 30000
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 900000
    refresh-expiration-ms: 2592000000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}

security:
  rate-limit:
    bypass-localhost: true
    login:
      max-attempts-per-account: 5
      max-attempts-per-ip: 20
      window-minutes: 15
      failure-reset-hours: 24
      lockout-attempts: 5
      lockout-minutes: 15
    register:
      max-attempts: 3
      window-hours: 1
    resend-verification:
      max-attempts: 3
      window-hours: 1
    forgot-password:
      max-attempts: 3
      window-hours: 1
    refresh:
      max-attempts: 10
      window-hours: 1
    verify-email:
      max-attempts: 10
      window-minutes: 15
    reset-password:
      max-attempts: 10
      window-minutes: 15
    phone-verify:
      max-attempts: 5
      window-minutes: 15
    phone-resend:
      max-attempts: 3
      window-hours: 1
    phone-update:
      max-attempts: 3
      window-hours: 24

paystack:
  secret-key: ${PAYSTACK_SECRET_KEY:}
  public-key: ${PAYSTACK_PUBLIC_KEY:}
  base-url: https://api.paystack.co
  callback-url: ${PAYSTACK_CALLBACK_URL:}
  # Paystack signs webhooks with your secret key (HMAC-SHA512). A separate
  # webhook secret is not issued; leave blank to verify with secret-key.
  webhook-secret: ${PAYSTACK_WEBHOOK_SECRET:}

supabase:
  url: ${SUPABASE_URL:https://kqadpgrcroelumtagsln.supabase.co}
  service-key: ${SUPABASE_SERVICE_KEY}
  storage:
    bucket: klink-storage

firebase:
  credentials-json: ${FIREBASE_CREDENTIALS_JSON:}
  credentials-path: firebase-service-account.json

sms:
  api-url: ${SMS_API_URL:}
  api-key: ${SMS_API_KEY:}
  sender-id: ${SMS_SENDER_ID:Klink}

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  from-number: ${TWILIO_FROM_NUMBER:}

