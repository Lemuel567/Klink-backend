name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

# Unit tests are pure Mockito (no Spring context, no database). The only
# @SpringBootTest (Demo5ApplicationTests) is @Disabled, so `mvnw test` needs
# neither a running PostgreSQL nor any of the .env secrets.
jobs:
  test:
    name: Backend — Java 17 unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run tests
        run: ./mvnw -B test
